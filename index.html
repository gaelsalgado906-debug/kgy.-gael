<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gael Hub - Premium Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code:wght@400&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e2e8f0; }
        .serif-font { font-family: 'Playfair Display', serif; }
        .code-font { font-family: 'Fira Code', monospace; }
        .slow-transition { transition: all 1.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .glass { background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <div id="section-intro" class="slow-transition text-center opacity-0 scale-95 blur-md">
        <h1 class="serif-font text-7xl md:text-9xl text-white italic mb-8 tracking-tighter">Gael Hub</h1>
        <button onclick="changeSection('section-intro', 'section-key')" class="px-12 py-3 rounded-full border border-white/10 bg-white/5 hover:bg-white/10 transition-all tracking-[0.3em] text-[10px] uppercase text-white shadow-2xl">
            Ingresar al Sistema
        </button>
    </div>

    <div id="section-key" class="hidden fixed inset-0 flex items-center justify-center">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-md translate-y-10 opacity-0 slow-transition">
            <div class="text-center mb-8">
                <h2 class="text-xs font-bold tracking-[0.4em] uppercase text-cyan-500 mb-2">Security Check</h2>
                <h3 class="text-2xl font-light text-white">Introduce la Llave</h3>
            </div>
            <input type="text" id="key-input" placeholder="Key Here" 
                class="w-full bg-black/50 border border-white/5 rounded-2xl px-4 py-4 text-center text-2xl tracking-[0.3em] text-white focus:outline-none focus:border-cyan-500/50 transition-all mb-4">
            <button onclick="validateKey()" class="w-full py-4 bg-white text-black font-bold text-[10px] uppercase tracking-widest rounded-2xl hover:bg-zinc-200 transition-all">Verificar Acceso</button>
            <button onclick="showKey()" class="w-full mt-4 text-[9px] text-zinc-600 hover:text-white transition-colors uppercase tracking-[0.2em]">Get Key (890)</button>
        </div>
    </div>

    <div id="section-panel" class="hidden fixed inset-0 flex items-center justify-center p-4">
        <div class="glass p-8 rounded-[3rem] w-full max-w-2xl translate-y-10 opacity-0 slow-transition">
            <div class="flex items-center justify-between mb-8 pb-6 border-b border-white/5">
                <h2 class="serif-font text-4xl text-white italic">Gael Hub</h2>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></span>
                    <span class="text-[9px] text-cyan-500 uppercase tracking-widest font-bold">Premium Core</span>
                </div>
            </div>

            <div class="grid gap-4">
                <button onclick="openScriptBox('script1')" class="group flex items-center justify-between p-6 bg-white/[0.02] border border-white/5 rounded-3xl hover:bg-white/[0.04] transition-all">
                    <div class="text-left">
                        <p class="text-white font-medium">Gael Hub Base</p>
                        <p class="text-zinc-500 text-[10px]">Configuración Inicial Wind UI</p>
                    </div>
                    <div class="bg-white/5 p-2 rounded-xl group-hover:scale-110 transition-transform">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                </button>

                <button onclick="openScriptBox('premium')" class="group flex items-center justify-between p-6 bg-gradient-to-br from-cyan-500/10 to-transparent border border-cyan-500/20 rounded-3xl hover:from-cyan-500/20 transition-all">
                    <div class="text-left">
                        <p class="text-cyan-400 font-bold flex items-center gap-2 text-lg">
                            Gael Hub Premium
                            <span class="text-[8px] bg-cyan-500 text-black px-1.5 py-0.5 rounded italic font-black uppercase">Core</span>
                        </p>
                        <p class="text-zinc-400/60 text-[10px]">Combat, Movement & Visuals (Dark Cyan Theme)</p>
                    </div>
                    <div class="bg-cyan-500/20 p-2 rounded-xl group-hover:rotate-12 transition-transform">
                        <svg class="w-5 h-5 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z" stroke-width="2" stroke-linecap="round"/></svg>
                    </div>
                </button>
            </div>
        </div>
    </div>

    <div id="modal-script" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md p-4">
        <div class="glass rounded-[2.5rem] w-full max-w-2xl overflow-hidden scale-90 opacity-0 transition-all duration-500" id="modal-content">
            <div class="flex justify-between items-center p-6 border-b border-white/5 bg-white/[0.02]">
                <span id="script-title" class="text-[10px] text-cyan-500 uppercase tracking-[0.3em] font-bold">Source Code</span>
                <button onclick="closeScriptBox()" class="text-zinc-500 hover:text-white text-2xl transition-colors">&times;</button>
            </div>
            
            <div class="p-6">
                <textarea id="lua-code" readonly class="code-font w-full h-80 bg-black/50 text-cyan-400/80 text-[11px] p-5 rounded-2xl border border-white/5 focus:outline-none resize-none leading-relaxed"></textarea>
                <button id="btn-copy" onclick="copyToClipboard()" class="w-full mt-6 py-4 bg-white hover:bg-zinc-200 text-black text-[10px] font-bold uppercase tracking-[0.2em] rounded-2xl transition-all shadow-xl">
                    Copiar Script al Portapapeles
                </button>
            </div>
        </div>
    </div>

    <script>
        const scripts = {
            script1: `-- Cargando la Wind UI Library\nlocal WindUI = loadstring(game:HttpGet("https://tree-hub.vercel.app/api/UI/WindUI"))()\n\nlocal Window = WindUI:CreateWindow({\n    Title = "Gael Hub", \n    Icon = "rbxassetid://10723343321", \n    Author = "By Gael", \n    Folder = "GaelHub_Configs" \n})\n\nlocal MainTab = Window:Tab({\n    Title = "Principal",\n    Icon = "rbxassetid://10723343321"\n})\n\nMainTab:Button({\n    Title = "Check Status",\n    Callback = function()\n        print("Gael Hub Base Loaded")\n    end\n})`,
            
            premium: `-- [[ GAEL HUB - ADAPTED CORE ]] --\nrepeat wait() until game:IsLoaded()\n\n-- Globales adaptadas\ngetgenv().GaelHubKey = getgenv().GaelHubKey or nil\nlocal Players = game:GetService("Players")\nlocal UserInputService = game:GetService("UserInputService")\nlocal Lighting = game:GetService("Lighting")\n\n-- 1. SISTEMA DE CARPETAS\nlocal Folder_Configs = {\n	Directory = "GaelHub",\n	Configs = "GaelHub/Configs",\n	Assets = "GaelHub/Assets"\n}\n\nfor _, Folder in pairs(Folder_Configs) do\n	if not isfolder(Folder) then makefolder(Folder) end\nend\n\n-- 2. CARGA DE LIBRERÍA WIND UI (Dark Cyan)\nlocal WindUI = loadstring(game:HttpGet("https://tree-hub.vercel.app/api/UI/WindUI"))()\n\nlocal Window = WindUI:CreateWindow({\n    Title = "Gael Hub",\n    Icon = "rbxassetid://10723343321",\n    Author = "By Gael",\n    Folder = "GaelHub_Configs",\n    Theme = {\n        Accent = Color3.fromRGB(0, 139, 139), -- Dark Cyan\n        Background = Color3.fromRGB(10, 10, 10),\n        Text = Color3.fromRGB(255, 255, 255)\n    }\n})\n\n-- [[ TAB: COMBATE ]] --\nlocal CombatTab = Window:Tab({ Title = "Combate", Icon = "rbxassetid://10723343321" })\nCombatTab:Section({ Title = "Asistencia de Juego" })\n\nCombatTab:Toggle({\n    Title = "Silent Aim",\n    Desc = "Predicción de disparo mejorada",\n    Value = false,\n    Callback = function(state) _G.SilentAim = state end\n})\n\n-- [[ TAB: MOVIMIENTO ]] --\nlocal MoveTab = Window:Tab({ Title = "Movimiento", Icon = "rbxassetid://10723343321" })\nMoveTab:Section({ Title = "Controles de Personaje" })\n\nMoveTab:Slider({\n    Title = "Velocidad (WalkSpeed)",\n    Min = 16, Max = 300, Default = 16,\n    Callback = function(v)\n        if Players.LocalPlayer.Character then\n            Players.LocalPlayer.Character.Humanoid.WalkSpeed = v\n        end\n    end\n})\n\nMoveTab:Slider({\n    Title = "Jump Power (Lider)",\n    Min = 50, Max = 500, Default = 50,\n    Callback = function(v)\n        local hum = Players.LocalPlayer.Character:FindFirstChildOfClass("Humanoid")\n        if hum then\n            hum.UseJumpPower = true\n            hum.JumpPower = v\n        end\n    end\n})\n\nlocal InfJumpEnabled = false\nMoveTab:Toggle({\n    Title = "Salto Infinito",\n    Value = false,\n    Callback = function(state) InfJumpEnabled = state end\n})\n\nUserInputService.JumpRequest:Connect(function()\n    if InfJumpEnabled then\n        local hum = Players.LocalPlayer.Character:FindFirstChildOfClass("Humanoid")\n        if hum then hum:ChangeState("Jumping") end\n    end\n})\n\n-- [[ TAB: VISUALES ]] --\nlocal VisualTab = Window:Tab({ Title = "Visuales", Icon = "rbxassetid://10723343321" })\nVisualTab:Section({ Title = "Entorno" })\n\nVisualTab:Toggle({\n    Title = "Full Bright",\n    Value = false,\n    Callback = function(state)\n        if state then\n            Lighting.Ambient = Color3.fromRGB(255, 255, 255)\n            Lighting.Brightness = 2\n        else\n            Lighting.Ambient = Color3.fromRGB(0, 0, 0)\n            Lighting.Brightness = 1\n        end\n    end\n})\n\n-- [[ TAB: AJUSTES ]] --\nlocal SettingsTab = Window:Tab({ Title = "Ajustes", Icon = "rbxassetid://10723343321" })\nSettingsTab:Button({ Title = "Rejoin", Callback = function() game:GetService("TeleportService"):Teleport(game.PlaceId, Players.LocalPlayer) end })\nSettingsTab:Button({ Title = "Cerrar Gael Hub", Callback = function() Window:Destroy() end })\n\nWindUI:Notify({\n    Title = "Gael Hub",\n    Content = "Sistema cargado con éxito. Tema Dark Cyan activado.",\n    Duration = 5\n})`
        };

        function changeSection(hideId, showId) {
            const hideEl = document.getElementById(hideId);
            const showEl = document.getElementById(showId);
            const showBox = showEl.querySelector('div');
            hideEl.classList.add('opacity-0', 'scale-90', 'blur-xl');
            setTimeout(() => {
                hideEl.classList.add('hidden');
                showEl.classList.remove('hidden');
                setTimeout(() => {
                    showBox.classList.remove('opacity-0', 'translate-y-10');
                    showBox.classList.add('opacity-100', 'translate-y-0');
                }, 50);
            }, 800);
        }

        function validateKey() {
            if(document.getElementById('key-input').value === "890") {
                changeSection('section-key', 'section-panel');
            } else { alert("Acceso Incorrecto"); }
        }

        function showKey() { document.getElementById('key-input').value = "890"; }

        function openScriptBox(type) {
            const modal = document.getElementById('modal-script');
            const content = document.getElementById('modal-content');
            document.getElementById('lua-code').value = scripts[type];
            document.getElementById('script-title').innerText = type === 'premium' ? 'GaelHub_Premium_Core.lua' : 'GaelHub_Base.lua';
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeScriptBox() {
            const content = document.getElementById('modal-content');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => document.getElementById('modal-script').classList.add('hidden'), 500);
        }

        function copyToClipboard() {
            const copyText = document.getElementById("lua-code");
            const btn = document.getElementById("btn-copy");
            copyText.select();
            navigator.clipboard.writeText(copyText.value);
            btn.innerText = "¡CÓDIGO COPIADO!";
            btn.classList.replace('bg-white', 'bg-cyan-500');
            btn.classList.add('text-white');
            setTimeout(() => {
                btn.innerText = "Copiar Script al Portapapeles";
                btn.classList.replace('bg-cyan-500', 'bg-white');
                btn.classList.remove('text-white');
            }, 2000);
        }

        window.onload = () => {
            const intro = document.getElementById('section-intro');
            intro.classList.remove('opacity-0', 'scale-95', 'blur-md');
            intro.classList.add('opacity-100', 'scale-100', 'blur-0');
        };
    </script>
</body>
</html>
